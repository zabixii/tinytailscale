name: Extract MT7612U Driver

on:
  workflow_dispatch:  # manually trigger

jobs:
  extract_driver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y binwalk squashfs-tools xz-utils findutils

      - name: Download firmware
        run: |
          curl -L -o firmware.bin https://gitlab.com/xchwarze/wifi-pineapple-cloner-builds/-/raw/main/releases/gl-mt300n-v2-universal-sysupgrade.bin

      - name: Extract firmware
        run: |
          mkdir extracted
          binwalk -e firmware.bin --directory extracted

      - name: Find MT7612U driver
        run: |
          find extracted -type f -name '*7612*.ko' > driver_list.txt
          echo "Found drivers:"
          cat driver_list.txt

      - name: Upload driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: mt7612u-driver
          path: driver_list.txt
