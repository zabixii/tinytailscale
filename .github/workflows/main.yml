name: Extract MT7612U Drivers

on:
  workflow_dispatch:
    inputs:
      firmware:
        description: 'Firmware file name (must be in repo root)'
        required: true
        default: 'firmware.bin'

jobs:
  extract_driver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install required tools
        run: |
          sudo apt update
          sudo apt install -y binwalk lzma-utils xz-utils unzip gzip

      - name: Create extraction folders
        run: |
          mkdir -p extracted kernel_extract

      - name: Get kernel offset and size
        id: kernel_info
        run: |
          OFFSET=$(binwalk ${{ github.event.inputs.firmware }} | grep 'uImage header' | awk '{print $1}')
          SIZE=$(binwalk ${{ github.event.inputs.firmware }} | grep 'uImage header' | awk '{print $9}')
          echo "OFFSET=$OFFSET" >> $GITHUB_ENV
          echo "SIZE=$SIZE" >> $GITHUB_ENV
          echo "Kernel offset: $OFFSET"
          echo "Kernel size: $SIZE"

      - name: Extract kernel image from firmware
        run: |
          dd if=${{ github.event.inputs.firmware }} bs=1 skip=$OFFSET count=$SIZE of=kernel.img status=progress

      - name: Decompress LZMA kernel
        run: |
          lzma -d -k kernel.img  # produces kernel.img.out

      - name: Extract files from kernel using binwalk
        run: |
          binwalk -e kernel.img.out

      - name: Find MT7612U driver modules
        run: |
          mkdir -p extracted/mt7612
          find _kernel.img.out.extracted -type f -name '*7612*.ko' -exec cp {} extracted/mt7612/ \;
          find extracted/mt7612 -type f

      - name: Upload extracted drivers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mt7612u-driver
          path: extracted/mt7612
