name: Extract MT7612U Driver

on:
  workflow_dispatch:

jobs:
  extract_driver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install required tools
        run: |
          sudo apt update
          sudo apt install -y binwalk xz-utils squashfs-tools gzip unzip

      - name: Prepare directories
        run: |
          mkdir -p extracted extracted/squashfs

      - name: Find SquashFS offset
        id: squash_offset
        run: |
          OFFSET=$(binwalk firmware.bin | grep Squashfs | awk '{print $1}')
          echo "SquashFS offset: $OFFSET"
          echo "OFFSET=$OFFSET" >> $GITHUB_ENV

      - name: Extract SquashFS image
        run: |
          dd if=firmware.bin bs=1 skip=$OFFSET of=firmware_squashfs.img status=progress

      - name: Unsquash filesystem
        run: |
          # Avoid superuser errors; ignore device creation failures
          unsquashfs -d extracted/squashfs firmware_squashfs.img || true

      - name: Find MT7612U drivers
        run: |
          find extracted/squashfs -type f -name '*7612*.ko' > driver_list.txt
          cat driver_list.txt

      - name: Upload extracted drivers
        uses: actions/upload-artifact@v4
        with:
          name: mt7612u-driver
          path: driver_list.txt
