name: Extract MT7612U Driver

on:
  workflow_dispatch:

jobs:
  extract_driver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y binwalk squashfs-tools xz-utils curl

      - name: Download firmware
        run: |
          curl -L -o firmware.bin https://gitlab.com/xchwarze/wifi-pineapple-cloner-builds/-/raw/main/releases/gl-mt300n-v2-universal-sysupgrade.bin

      - name: Extract firmware
        run: |
          mkdir extracted
          # Try binwalk first
          binwalk -e firmware.bin --directory extracted || echo "Binwalk extraction failed, fallback to manual unsquashfs"

          # If SquashFS folder doesn't exist, manually extract it
          if [ ! -d extracted/_firmware.bin.extracted/squashfs-root ]; then
            OFFSET=$(binwalk firmware.bin | grep Squashfs | awk '{print $1}')
            dd if=firmware.bin bs=1 skip=$OFFSET of=squashfs.img
            mkdir extracted/squashfs
            unsquashfs -d extracted/squashfs squashfs.img
          fi

      - name: Find MT7612U driver
        run: |
          find extracted -type f -name '*7612*.ko' > driver_list.txt
          cat driver_list.txt

      - name: Upload driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: mt7612u-driver
          path: |
            driver_list.txt
            extracted/**/7612*.ko
