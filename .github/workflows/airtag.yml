name: Build Patched OpenTagViewer

on:
  workflow_dispatch: # Allows you to run this manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Patch Target SDK (Fix Android 15 Overlap)
        run: |
          # Finds targetSdk 35 and replaces it with 34 in all build.gradle files
          find . -name "build.gradle*" -exec sed -i 's/targetSdk = 35/targetSdk = 34/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/targetSdk 35/targetSdk 34/g' {} +
          echo "Target SDK has been downgraded to 34 to force status bar padding."

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-Android15-Fix
          path: app/build/outputs/apk/debug/*.apk
