name: Build Patched OpenTagViewer (Black Bar Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenTagViewer Repository
        uses: actions/checkout@v4
        with:
          repository: SadGare/OpenTagViewer
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject Black Bar & Fix Layout Overlap
        run: |
          python3 -c '
          import os

          # 1. Inject fitsSystemWindows="true" into ALL layout files
          layout_dir = "app/src/main/res/layout"
          if os.path.exists(layout_dir):
              for file in os.listdir(layout_dir):
                  if file.endswith(".xml"):
                      path = os.path.join(layout_dir, file)
                      with open(path, "r") as f:
                          data = f.read()
                      if "fitsSystemWindows" not in data:
                          data = data.replace(
                              "xmlns:android=\"http://schemas.android.com/apk/res/android\"",
                              "xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:fitsSystemWindows=\"true\""
                          )
                          with open(path, "w") as f:
                              f.write(data)

          # 2. Inject Solid Black Status Bar & Android 15 Opt-Out into ALL themes
          for val_dir in ["values", "values-night", "values-night-v27"]:
              theme_dir = f"app/src/main/res/{val_dir}"
              if os.path.exists(theme_dir):
                  for file in os.listdir(theme_dir):
                      if file == "themes.xml":
                          path = os.path.join(theme_dir, file)
                          with open(path, "r") as f:
                              data = f.read()
                          
                          # This injects the black bar and opt-out right before the style tag closes
                          injection = """
              <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>
              <item name="android:statusBarColor">#000000</item>
          </style>"""
                          data = data.replace("</style>", injection)
                          with open(path, "w") as f:
                              f.write(data)
          print("Successfully injected the black status bar and forced layout padding!")
          '

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-BlackBar-Fix
          path: "**/app/build/outputs/apk/debug/*.apk"
