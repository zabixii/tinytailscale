name: Build Patched OpenTagViewer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch Target SDK (Android 15 Fix)
        run: |
          # Use find to locate build.gradle.kts anywhere in the repo
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk = 35/targetSdk = 34/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk(35)/targetSdk(34)/g' {} +
          echo "Target SDK 34 patch applied."

      - name: Find and Fix Gradlew
        run: |
          # This finds gradlew even if it's in a subfolder and makes it executable
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found anywhere in the repo!"
            exit 1
          fi
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_EXECUTABLE=$GRADLEW_PATH" >> $GITHUB_ENV
          echo "Found gradlew at: $GRADLEW_PATH"

      - name: Build Debug APK
        run: |
          # Use the environment variable we just saved to run the build
          ${{ env.GRADLEW_EXECUTABLE }} :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-A15-Fix
          path: "**/app/build/outputs/apk/debug/*.apk"
