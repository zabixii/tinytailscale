name: Build Patched OpenTagViewer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch Target SDK (Android 15 Fix)
        run: |
          # The repo uses Kotlin DSL, so we look for targetSdk = 35 or targetSdk(35)
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk = 35/targetSdk = 34/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk(35)/targetSdk(34)/g' {} +
          echo "Downgraded targetSdk to 34 for Android 15 compatibility."

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-A15-Fix
          path: app/build/outputs/apk/debug/*.apk
