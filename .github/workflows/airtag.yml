name: Build Patched OpenTagViewer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch Target SDK (Android 15 Fix)
        run: |
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk = 35/targetSdk = 34/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk(35)/targetSdk(34)/g' {} +
          echo "Target SDK 34 patch applied."

      - name: Repair/Generate Gradle Wrapper
        run: |
          # If gradlew is missing, use installed 'gradle' to create it
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating fresh wrapper..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-Fix
          path: "**/app/build/outputs/apk/debug/*.apk"
