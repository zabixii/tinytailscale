name: Build Patched OpenTagViewer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: Download the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 2: Set up Java (Caching is disabled here to avoid the "No file matched" error)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove the 'cache: gradle' line to prevent the error you saw
          # if the project structure isn't standard yet.

      # STEP 3: Patch the target SDK
      - name: Patch Target SDK (Fix Android 15 Overlap)
        run: |
          # Finds targetSdk and replaces it with 34 in all build scripts
          find . -name "build.gradle*" -exec sed -i 's/targetSdk = [0-9]*/targetSdk = 34/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/targetSdk [0-9]*/targetSdk 34/g' {} +
          echo "Applied Android 15 status bar fix (Target SDK 34)"

      # STEP 4: Build the APK
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # STEP 5: Save the finished file
      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-Fix
          path: "**/*.apk" # This will find the APK wherever it was built
