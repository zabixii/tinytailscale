name: Build Patched OpenTagViewer (Master Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenTagViewer Repository
        uses: actions/checkout@v4
        with:
          repository: SadGare/OpenTagViewer
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject Real API Keys
        run: |
          # We use the real keys you found in the manifest
          echo "MAPS_API_KEY=AIzaSyD_Dkqs1_ySU1epRSdJDI9Slvh6gF7XhUE" > secrets.properties
          echo "AMAP_API_KEY=ad1d1be237c02bfdeb1eb21cdd75ae36" >> secrets.properties
          
          # Also create local.properties just in case the build script looks there
          echo "MAPS_API_KEY=AIzaSyD_Dkqs1_ySU1epRSdJDI9Slvh6gF7XhUE" > local.properties
          echo "AMAP_API_KEY=ad1d1be237c02bfdeb1eb21cdd75ae36" >> local.properties

      - name: Inject Black Bar & Force Safe Area
        run: |
          python3 -c '
          import os

          # 1. Inject fitsSystemWindows="true" into ALL layouts
          layout_dir = "app/src/main/res/layout"
          if os.path.exists(layout_dir):
              for file in os.listdir(layout_dir):
                  if file.endswith(".xml"):
                      path = os.path.join(layout_dir, file)
                      with open(path, "r") as f:
                          data = f.read()
                      if "fitsSystemWindows" not in data:
                          data = data.replace(
                              "xmlns:android=\"http://schemas.android.com/apk/res/android\"",
                              "xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:fitsSystemWindows=\"true\""
                          )
                          with open(path, "w") as f:
                              f.write(data)

          # 2. Inject Solid Black Status Bar & Android 15 Opt-Out
          for val_dir in ["values", "values-night", "values-night-v27"]:
              theme_dir = f"app/src/main/res/{val_dir}"
              if os.path.exists(theme_dir):
                  for file in os.listdir(theme_dir):
                      if file == "themes.xml":
                          path = os.path.join(theme_dir, file)
                          with open(path, "r") as f:
                              data = f.read()
                          
                          # Injects the bar and opt-out right before the style tag ends
                          injection = """
              <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>
              <item name="android:statusBarColor">#000000</item>
          </style>"""
                          data = data.replace("</style>", injection)
                          with open(path, "w") as f:
                              f.write(data)
          '

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-OnePlus15-Fix
          path: "**/app/build/outputs/apk/debug/*.apk"
