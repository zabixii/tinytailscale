name: Build Patched OpenTagViewer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Explicitly clone the OpenTagViewer code, ignoring tinytailscale
      - name: Checkout OpenTagViewer Repository
        uses: actions/checkout@v4
        with:
          repository: SadGare/OpenTagViewer
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch Target SDK (Android 15 Fix)
        run: |
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk = 35/targetSdk = 34/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk(35)/targetSdk(34)/g' {} +
          echo "Target SDK downgraded to 34."

      - name: Build Debug APK
        run: |
          # Because we explicitly cloned the right repo, gradlew will be here
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-A15-Fix
          path: "**/app/build/outputs/apk/debug/*.apk"
